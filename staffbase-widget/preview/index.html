<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staffbase Qualtrics Widget Preview</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; background: #f4f6fb; color: #1f2937; }
      .card { background: white; border: 1px solid #d1d5db; border-radius: 12px; padding: 20px; max-width: 860px; }
      button { margin-top: 12px; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
      pre { background: #f8fafc; padding: 16px; border-radius: 10px; overflow: auto; white-space: pre-wrap; }
      a { color: #2563eb; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Staffbase Qualtrics Widget Preview</h1>
      <p>This page loads the built widget bundle and initializes it with a fake Staffbase context.</p>
      <div>
        <button id="refresh">Refresh Qualtrics</button>
        <button id="testPopup">Test Pop-up</button>
        <button id="testFeedback">Test Feedback Button</button>
        <button id="testEmbedded">Test Embedded (demo)</button>
      </div>
      <h2>Logs</h2>
      <pre id="logs">Starting widget preview...
</pre>
      <p>Open the browser console for more details.</p>
      <p>Built bundle: <code>/dist/index.js</code></p>
    </div>
    <script type="module" src="./preview-init.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staffbase Qualtrics Plugin Preview</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; background: #f4f6fb; color: #1f2937; }
      .card { background: white; border: 1px solid #d1d5db; border-radius: 12px; padding: 20px; max-width: 860px; }
      button { margin-top: 12px; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
      pre { background: #f8fafc; padding: 16px; border-radius: 10px; overflow: auto; white-space: pre-wrap; }
      a { color: #2563eb; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Staffbase Qualtrics Plugin Preview</h1><p>This page loads the built plugin bundle and initializes it with a fake Staffbase context.</p>
      <p>Qualtrics Zone URL will be loaded directly from the plugin.</p>
      <div>
        <button id="refresh">Refresh Qualtrics</button>
        <button id="testPopup">Test Pop-up</button>
        <button id="testFeedback">Test Feedback Button</button>
        <button id="testEmbedded">Test Embedded (demo)</button>
      </div>
      <h2>Logs</h2>
      <pre id="logs">Starting plugin preview...
</pre>
      <p>Open the browser console for more details.</p>
      <p>Built bundle: <code>../dist/index.js</code></p>
    </div>
    <script type="module">
      const logArea = document.getElementById('logs');
      const log = (message) => {
        logArea.textContent += message + '\n';
      };

      try {
        const { default: initPlugin } = await import('../dist/index.js');
        const context = {
          user: { id: 'dev-user-001', externalId: 'dev-user-001' },
          router: {
            listen(callback) {
              document.getElementById('refresh').addEventListener('click', () => {
                log('SPA route refresh triggered');
                callback();
              });
            }
          }
        };

        initPlugin(context);
        log('Plugin initialized with fake Staffbase context.');
      } catch (error) {
        log('Plugin load failed: ' + error.message);
        console.error(error);
      }
      document.getElementById('testPopup').addEventListener('click', () => {
        const url = new URL(window.location.href);
        url.searchParams.set('QualtricsTest_PopUp', '1');
        window.location.href = url.toString();
      });
      document.getElementById('testFeedback').addEventListener('click', () => {
        const url = new URL(window.location.href);
        url.searchParams.set('QualtricsTest_FeedbackButton', '1');
        window.location.href = url.toString();
      });
      document.getElementById('testEmbedded').addEventListener('click', () => {
        const url = new URL(window.location.href);
        url.searchParams.set('QualtricsTest_Embedded', '1');
        // demo selector for embedded: preview container
        url.searchParams.set('qualtricsSelector', '#embedded-target');
        window.location.href = url.toString();
      });

      // add a demo embedded target for preview
      const demoTarget = document.createElement('div');
      demoTarget.id = 'embedded-target';
      demoTarget.style.marginTop = '18px';
      demoTarget.innerHTML = '<strong>Embedded intercept demo target</strong> <div id="embedded-target-inner"></div>';
      document.querySelector('.card').appendChild(demoTarget);
    </script>
  </body>
</html>
